services:
  - type: web
    name: crediclass-dashboard
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PYTHONUNBUFFERED
        value: "1"
    routes:
      - path: /api/*
        destination: http://0.0.0.0:$PORT/api/$1
      - path: /*
        destination: http://0.0.0.0:$PORT/$1
